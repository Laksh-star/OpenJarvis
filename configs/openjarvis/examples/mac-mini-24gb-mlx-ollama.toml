# Mac Mini 24GB Apple Silicon profile
# Copy to ~/.openjarvis/config.toml, or run:
#   scripts/setup-mac-mini-24gb.sh --write-user-config
#
# Primary path: MLX OpenAI-compatible server on localhost:8080.
# Compatibility path: Ollama on localhost:11434.

[engine]
default = "mlx"

[engine.mlx]
host = "http://localhost:8080"

[engine.ollama]
host = "http://localhost:11434"

[intelligence]
default_model = "mlx-community/Qwen2.5-7B-Instruct-4bit"
fallback_model = "qwen3.5:9b"
preferred_engine = "mlx"
provider = "local"
quantization = "int4"
temperature = 0.4
max_tokens = 1536
top_p = 0.9
top_k = 40
repetition_penalty = 1.05

[agent]
default_agent = "orchestrator"
max_turns = 12
objective = "Run local-first personal AI workflows on a 24GB Apple Silicon Mac Mini, using MLX for fast local inference and Ollama as the fallback runtime."
tools = "think,calculator,web_search,file_read,file_write,shell_exec,memory_store,memory_search"
context_from_memory = true

[tools]
enabled = "think,calculator,web_search,file_read,file_write,shell_exec,memory_store,memory_search"

[tools.storage]
default_backend = "sqlite"
db_path = "~/.openjarvis/memory.db"

[tools.mcp]
enabled = true

[server]
host = "127.0.0.1"
port = 8000
agent = "orchestrator"
model = "mlx-community/Qwen2.5-7B-Instruct-4bit"
workers = 1

[telemetry]
enabled = true
db_path = "~/.openjarvis/telemetry.db"
gpu_metrics = true
gpu_poll_interval_ms = 100
energy_vendor = "apple"
warmup_samples = 1
steady_state_window = 5
steady_state_threshold = 0.05

[traces]
enabled = true
db_path = "~/.openjarvis/traces.db"

[learning]
enabled = false

[learning.routing]
policy = "heuristic"

[learning.skills]
auto_optimize = false
optimizer = "dspy"
min_traces_per_skill = 20
